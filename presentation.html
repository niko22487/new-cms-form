<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting a form to the CMS — end-to-end</title>
<style>
:root{
  --bg:#15161A; --panel:#1F2127; --txt:#F4F4F6; --muted:#A0A3AB; --pink:#E21E78; --line:rgba(255,255,255,0.10);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:var(--bg);font-family:var(--font);color:var(--txt);overflow:hidden;}
.deck{height:100vh;width:100vw;position:relative;}
.slide{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;padding:34px 44px 78px;}
.slide.on{display:flex;}
.cap{text-align:center;flex-shrink:0;max-width:900px;margin-bottom:20px;}
.step{display:inline-block;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#fff;background:var(--pink);padding:4px 11px;border-radius:20px;margin-bottom:12px;}
.cap h2{margin:0 0 8px;font-size:25px;font-weight:600;letter-spacing:-0.2px;}
.cap p{margin:0;font-size:15px;line-height:1.5;color:var(--muted);}
.shot{flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;}
.shot img{max-width:100%;max-height:100%;object-fit:contain;border:1px solid var(--line);border-radius:10px;box-shadow:0 18px 60px rgba(0,0,0,0.45);background:#fff;}
.bar{position:fixed;left:0;right:0;bottom:0;height:58px;display:flex;align-items:center;justify-content:center;gap:18px;background:linear-gradient(to top,rgba(0,0,0,0.35),transparent);}
.nav-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,opacity .12s;}
.nav-btn:hover{background:#2A2D35;}
.nav-btn:disabled{opacity:.35;cursor:default;}
.dots{display:flex;gap:7px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.22);cursor:pointer;transition:background .12s,width .12s,border-radius .12s;}
.dot.on{width:20px;border-radius:4px;background:var(--pink);}
.counter{position:fixed;top:20px;right:24px;font-size:12px;color:var(--muted);letter-spacing:.4px;}
.brand{position:fixed;top:18px;left:24px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px;}
.brand .d{width:14px;height:14px;border-radius:3px;background:var(--pink);}
.hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<div class="brand"><span class="d"></span> Wix Forms × CMS — connect a form</div>
<div class="counter" id="counter">1 / 8</div>
<div class="deck" id="deck"></div>
<div class="hint">Use ← → arrow keys to navigate</div>
<div class="bar">
  <button class="nav-btn" id="prev" aria-label="Previous">‹</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="next" aria-label="Next">›</button>
</div>

<script>
var SLIDES=[
  {img:'shots/01-elements.png', title:'Open the CMS category', cap:'In the Editor’s Add panel, a dedicated CMS category offers Create new form, Generate with AI, or Add existing form.'},
  {img:'shots/02-modal.png', title:'Choose where submissions go', cap:'When a form is added, choose its destination context — Wix Forms, or here a CMS Collection.'},
  {img:'shots/03-choose.png', title:'Pick the collection', cap:'Select which collection the form connects to. Its fields define the structure of the form.'},
  {img:'shots/04-connected.png', title:'Connected to Recipes', cap:'The form lands on the canvas bound to the Recipes collection — shown by the pink “Connected to Recipes” boundary.'},
  {img:'shots/05-formprops.png', title:'Form properties', cap:'Selecting the form reveals its connection (Recipes Item) and what it does — add a new item or update an existing one.'},
  {img:'shots/06-fieldprops.png', title:'Field mapping & settings', cap:'Each field shows the collection value it saves to (recipes.ingredients), plus placeholder, description and required — locked when defined by the collection.'},
  {img:'shots/07-button.png', title:'Submit button action', cap:'The Submit button’s on-click action is tied to the collection — recipes.item.new when adding a new item.'},
  {img:'shots/08-update.png', title:'Update an existing item', cap:'Switch to “Update existing” to pick an item; the form pre-loads it and the action becomes recipes.item.update.'}
];
var i=0, deck=document.getElementById('deck'), dots=document.getElementById('dots');
SLIDES.forEach(function(s,n){
  var el=document.createElement('div'); el.className='slide'+(n===0?' on':'');
  el.innerHTML='<div class="cap"><div class="step">Step '+(n+1)+' of '+SLIDES.length+'</div>'
    +'<h2>'+s.title+'</h2><p>'+s.cap+'</p></div>'
    +'<div class="shot"><img src="'+s.img+'" alt="'+s.title+'"></div>';
  deck.appendChild(el);
  var d=document.createElement('div'); d.className='dot'+(n===0?' on':''); d.onclick=function(){go(n);}; dots.appendChild(d);
});
var slides=deck.querySelectorAll('.slide'), dotEls=dots.querySelectorAll('.dot');
function go(n){
  i=Math.max(0,Math.min(SLIDES.length-1,n));
  for(var k=0;k<slides.length;k++){ slides[k].classList.toggle('on',k===i); dotEls[k].classList.toggle('on',k===i); }
  document.getElementById('counter').textContent=(i+1)+' / '+SLIDES.length;
  document.getElementById('prev').disabled=(i===0);
  document.getElementById('next').disabled=(i===SLIDES.length-1);
}
document.getElementById('prev').onclick=function(){go(i-1);};
document.getElementById('next').onclick=function(){go(i+1);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ') {go(i+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp') {go(i-1);e.preventDefault();}
  else if(e.key==='Home') go(0);
  else if(e.key==='End') go(SLIDES.length-1);
});
go(0);
</script>
</body>
</html>
