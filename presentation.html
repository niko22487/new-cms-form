<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting a form to the CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --wine:#531417; --blush:#E3C9C0; --orange:#DD6A33; --rose:#EAD1CC;
  --font:'Poppins',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:#0E0F12;font-family:var(--font);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.stage{position:relative;overflow:hidden;
  width:min(100vw, calc(100vh * 16 / 9));
  height:min(100vh, calc(100vw * 9 / 16));
  container-type:size;}
.slide{position:absolute;inset:0;display:none;}
.slide.on{display:block;}
.slide.demo.on{display:flex;}

/* Title slide */
.slide.title{background:var(--wine);}
.title .kicker{position:absolute;left:7cqw;top:30cqh;font-size:2cqw;font-weight:600;letter-spacing:.35cqw;color:var(--rose);opacity:.85;}
.title h1{position:absolute;left:7cqw;top:34cqh;right:10cqw;margin:0;font-size:8.2cqw;font-weight:300;line-height:1.08;color:var(--rose);}
.title .foot{position:absolute;left:7cqw;bottom:7cqh;font-size:1.7cqw;line-height:1.5;color:var(--rose);opacity:.8;}

/* Section divider */
.slide.divider{background:var(--orange);}
.divider h2{position:absolute;left:7cqw;top:50%;transform:translateY(-50%);right:8cqw;margin:0;font-size:7.6cqw;font-weight:700;line-height:1.05;color:#fff;}

/* Demo slides */
.slide.demo{background:var(--blush);flex-direction:row;}
.demo-left{width:34%;flex-shrink:0;padding:8.5cqh 1cqw 8cqh 7cqw;}
.demo-title{margin:0;font-size:5cqw;font-weight:700;line-height:1.05;color:var(--wine);}
.demo-cap{margin:8cqh 0 0;font-size:2.25cqw;font-weight:400;line-height:1.5;color:var(--wine);max-width:94%;}
.demo-right{flex:1;display:flex;align-items:center;justify-content:center;padding:6cqh 6cqw 6cqh 1cqw;min-width:0;}
.demo-right img{max-width:100%;max-height:100%;object-fit:contain;border:1px solid rgba(83,20,23,0.12);border-radius:0.8cqw;box-shadow:0 1.4cqw 4cqw rgba(60,10,12,0.22);background:#fff;}

/* Chrome (counter, bar) */
.counter{position:fixed;top:16px;right:18px;font-size:12px;color:#9A8;color:rgba(255,255,255,.5);letter-spacing:.4px;font-family:var(--font);z-index:5;}
.bar{position:fixed;left:0;right:0;bottom:0;height:54px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:5;}
.nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:rgba(255,255,255,.14);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;position:relative;}
.dot.on{width:18px;border-radius:4px;background:var(--orange);}
.dot.hasnotes::after{content:"";position:absolute;top:-4px;right:-2px;width:4px;height:4px;border-radius:50%;background:var(--rose);}
.notes-btn{position:fixed;top:14px;left:18px;z-index:6;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;font-family:var(--font);font-size:12px;font-weight:500;padding:6px 12px;border-radius:18px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.notes-btn:hover{background:rgba(255,255,255,.15);}
.notes-btn .nb-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);display:none;}
.notes-btn.has .nb-dot{display:inline-block;}

/* Notes drawer */
.drawer{position:fixed;top:0;right:0;height:100vh;width:360px;max-width:88vw;background:#fff;box-shadow:-6px 0 30px rgba(0,0,0,.3);transform:translateX(100%);transition:transform .22s ease;z-index:20;display:flex;flex-direction:column;font-family:var(--font);}
body.drawer-open .drawer{transform:translateX(0);}
.dr-head{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 18px 14px;background:var(--wine);color:var(--rose);}
.dr-title{font-size:15px;font-weight:600;color:#fff;}
.dr-sub{font-size:12px;margin-top:3px;opacity:.85;}
.dr-close{border:none;background:transparent;color:var(--rose);font-size:18px;cursor:pointer;line-height:1;}
.dr-body{flex:1;overflow-y:auto;padding:16px 18px;}
.dr-lbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#8A6;color:#9A7F78;margin:14px 0 6px;}
.dr-lbl:first-child{margin-top:0;}
.dr-ta{width:100%;min-height:120px;border:1px solid #E3D4CF;border-radius:8px;padding:10px 11px;font-family:var(--font);font-size:13px;line-height:1.5;color:#2B1416;background:#FBF7F6;resize:vertical;outline:none;}
.dr-ta:focus{border-color:var(--orange);}
.dr-foot{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid #F0E7E4;}
.dr-saved{font-size:11px;color:#9A7F78;}
.dr-copy{border:1px solid var(--wine);background:#fff;color:var(--wine);font-family:var(--font);font-size:12px;font-weight:500;padding:6px 12px;border-radius:7px;cursor:pointer;}
.dr-copy:hover{background:var(--wine);color:#fff;}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:#1b1416;color:#fff;font-family:var(--font);font-size:12px;padding:7px 14px;border-radius:20px;opacity:0;transition:opacity .2s;z-index:30;pointer-events:none;}
.toast.show{opacity:1;}
.hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.28);font-family:var(--font);z-index:4;}
</style>
</head>
<body>
<div class="stage" id="stage"></div>

<button class="notes-btn" id="notesBtn"><span class="nb-dot"></span>✎ Notes</button>
<div class="counter" id="counter">1 / 12</div>
<div class="hint">← → to navigate · N for notes</div>
<div class="bar">
  <button class="nav-btn" id="prev" aria-label="Previous">‹</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn" id="next" aria-label="Next">›</button>
</div>

<aside class="drawer" id="drawer">
  <div class="dr-head">
    <div><div class="dr-title">Notes &amp; open questions</div><div class="dr-sub" id="drSub">Slide 1</div></div>
    <button class="dr-close" id="drClose" aria-label="Close">✕</button>
  </div>
  <div class="dr-body">
    <label class="dr-lbl">Notes</label>
    <textarea class="dr-ta" id="drNotes" placeholder="Notes for this slide…"></textarea>
    <label class="dr-lbl">Open questions</label>
    <textarea class="dr-ta" id="drQ" placeholder="Open questions for this slide…"></textarea>
  </div>
  <div class="dr-foot">
    <span class="dr-saved">Saved in this browser</span>
    <button class="dr-copy" id="drCopy">Copy all notes</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
var DEMOS=[
  {title:'Open the CMS category', cap:'In the Editor’s Add panel, a dedicated CMS category offers Create new form, Generate with AI, or Add existing form.', img:'shots/01-elements.png'},
  {title:'Choose where submissions go', cap:'When a form is added, choose its destination context — Wix Forms, or here a CMS Collection.', img:'shots/02-modal.png'},
  {title:'Pick the collection', cap:'Select which collection the form connects to. Its fields define the structure of the form.', img:'shots/03-choose.png'},
  {title:'Connected to Recipes', cap:'The form lands on the canvas bound to the Recipes collection — shown by the pink “Connected to Recipes” boundary.', img:'shots/04-connected.png'},
  {title:'Form properties', cap:'Selecting the form reveals its connection (Recipes Item) and what it does — add a new item or update an existing one.', img:'shots/05-formprops.png'},
  {title:'Field mapping & settings', cap:'Each field shows the collection value it saves to (recipes.ingredients), plus placeholder, description and required — locked when defined by the collection.', img:'shots/06-fieldprops.png'},
  {title:'Submit button action', cap:'The Submit button’s on-click action is tied to the collection — recipes.item.new when adding a new item.', img:'shots/07-button.png'},
  {title:'Update an existing item', cap:'Switch to “Update existing” to pick an item; the form pre-loads it and the action becomes recipes.item.update.', img:'shots/08-update.png'},
  {title:'Switch the connection any time', cap:'Clicking the connection card opens a picker to re-point the form at any context — Wix Forms, another collection, Members or Blog.', img:'shots/09-picker.png'},
  {title:'Switched to Wix Forms', cap:'Pick a Wix Form (e.g. Contact Us) and the same form element now submits to the Wix Forms context instead of the collection.', img:'shots/10-wixforms.png'}
];
var SLIDES=[{type:'title'},{type:'divider', title:'The end-to-end flow'}];
DEMOS.forEach(function(d,i){ SLIDES.push({type:'demo', num:i+1, title:d.title, cap:d.cap, img:d.img}); });

var stage=document.getElementById('stage');
SLIDES.forEach(function(s,n){
  var el=document.createElement('div'); el.className='slide '+s.type+(n===0?' on':'');
  if(s.type==='title'){
    el.innerHTML='<div class="kicker">WIX FORMS  ×  CMS</div>'
      +'<h1>Connecting a form<br>to the CMS</h1>'
      +'<div class="foot">CMS / Niko<br>June 2026</div>';
  } else if(s.type==='divider'){
    el.innerHTML='<h2>'+s.title+'</h2>';
  } else {
    el.innerHTML='<div class="demo-left"><h2 class="demo-title">'+s.title+'</h2><p class="demo-cap">'+s.cap+'</p></div>'
      +'<div class="demo-right"><img src="'+s.img+'" alt="'+s.title+'"></div>';
  }
  stage.appendChild(el);
});
var slides=stage.querySelectorAll('.slide');

var dots=document.getElementById('dots');
SLIDES.forEach(function(s,n){ var d=document.createElement('div'); d.className='dot'+(n===0?' on':''); d.onclick=function(){go(n);}; dots.appendChild(d); });
var dotEls=dots.querySelectorAll('.dot');

var cur=0;
function slideTitle(i){var s=SLIDES[i];return s.type==='title'?'Title slide':(s.type==='divider'?('Divider — '+s.title):(s.num+'. '+s.title));}
function go(n){
  cur=Math.max(0,Math.min(SLIDES.length-1,n));
  for(var k=0;k<slides.length;k++){ slides[k].classList.toggle('on',k===cur); dotEls[k].classList.toggle('on',k===cur); }
  document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;
  document.getElementById('prev').disabled=(cur===0);
  document.getElementById('next').disabled=(cur===SLIDES.length-1);
  if(document.body.classList.contains('drawer-open')) loadNotesFor(cur);
  refreshNotesBtn();
}
document.getElementById('prev').onclick=function(){go(cur-1);};
document.getElementById('next').onclick=function(){go(cur+1);};
document.addEventListener('keydown',function(e){
  var t=e.target.tagName; if(t==='TEXTAREA'||t==='INPUT') return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){go(cur+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){go(cur-1);e.preventDefault();}
  else if(e.key==='Home')go(0);
  else if(e.key==='End')go(SLIDES.length-1);
  else if(e.key==='n'||e.key==='N'){toggleDrawer();e.preventDefault();}
});

/* ---- Persistent notes ---- */
var NK='cmsDeckNotes_v1', NOTES={};
try{ NOTES=JSON.parse(localStorage.getItem(NK)||'{}'); }catch(e){ NOTES={}; }
var drNotes=document.getElementById('drNotes'), drQ=document.getElementById('drQ');
function loadNotesFor(i){ var d=NOTES[i]||{}; drNotes.value=d.n||''; drQ.value=d.q||''; document.getElementById('drSub').textContent=slideTitle(i); }
function saveNotes(){
  var n=drNotes.value, q=drQ.value;
  if(n.trim()||q.trim()) NOTES[cur]={n:n,q:q}; else delete NOTES[cur];
  try{ localStorage.setItem(NK, JSON.stringify(NOTES)); }catch(e){}
  updateDots(); refreshNotesBtn();
}
drNotes.addEventListener('input', saveNotes);
drQ.addEventListener('input', saveNotes);
function updateDots(){ for(var i=0;i<dotEls.length;i++){ var d=NOTES[i]; dotEls[i].classList.toggle('hasnotes', !!(d&&(d.n&&d.n.trim()||d.q&&d.q.trim()))); } }
function refreshNotesBtn(){ var d=NOTES[cur]; document.getElementById('notesBtn').classList.toggle('has', !!(d&&(d.n&&d.n.trim()||d.q&&d.q.trim()))); }
function toggleDrawer(){ document.body.classList.toggle('drawer-open'); if(document.body.classList.contains('drawer-open')){ loadNotesFor(cur); setTimeout(function(){drNotes.focus();},0); } }
document.getElementById('notesBtn').onclick=toggleDrawer;
document.getElementById('drClose').onclick=toggleDrawer;
document.getElementById('drCopy').onclick=function(){
  var out=[]; for(var i=0;i<SLIDES.length;i++){ var d=NOTES[i]; if(d&&(d.n&&d.n.trim()||d.q&&d.q.trim())){ out.push('## '+slideTitle(i)); if(d.n&&d.n.trim())out.push('Notes: '+d.n.trim()); if(d.q&&d.q.trim())out.push('Open questions: '+d.q.trim()); out.push(''); } }
  var text=out.join('\n').trim()||'(no notes yet)';
  function done(){ toast('All notes copied to clipboard'); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done, function(){ window.prompt('Copy your notes:', text); }); }
  else { window.prompt('Copy your notes:', text); }
};
var toastTimer;
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove('show');},2200); }

updateDots(); refreshNotesBtn(); go(0);
</script>
</body>
</html>
